<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5f7fb; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2) !important; }
        .sidebar { background: white; min-height: 100vh; border-right: 1px solid #eee; }
        .sidebar .nav-link { margin: 4px 12px; border-radius: 12px; padding: 10px 16px; color: #555; font-weight: 500; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #f0f2ff; color: #667eea; }
        .sidebar .nav-link.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .table { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.04); }
    </style>
</head>
<body>
    <header class="navbar navbar-dark sticky-top px-3">
        <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">ExpenseTracker</a>
        <div class="ms-auto"><a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm rounded-pill">Logout</a></div>
    </header>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar p-3">
                <ul class="nav flex-column">
                    <li><a class="nav-link" href="{{ url_for('dashboard') }}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                    <li><a class="nav-link" href="{{ url_for('transactions') }}"><i class="bi bi-arrow-left-right me-2"></i>Transactions</a></li>
                    <li><a class="nav-link" href="{{ url_for('budgets') }}"><i class="bi bi-wallet2 me-2"></i>Budgets</a></li>
                    <li><a class="nav-link" href="{{ url_for('goals') }}"><i class="bi bi-bullseye me-2"></i>Goals</a></li>
                    <li><a class="nav-link" href="{{ url_for('reports') }}"><i class="bi bi-graph-up me-2"></i>Reports</a></li>
                    <li><a class="nav-link active" href="{{ url_for('admin_panel') }}"><i class="bi bi-shield-lock me-2"></i>Admin</a></li>
                </ul>
            </nav>
            <main class="col-md-10 ms-sm-auto px-4 py-4">
                <h2 class="fw-bold">Admin Panel</h2>
                {% if users %}
                <div class="table-responsive mt-4">
                    <table class="table table-hover align-middle">
                        <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
                        <tbody>
                        {% for user in users %}
                        <tr>
                            <td>{{ user.id }}</td>
                            <td>{{ user.name }}</td>
                            <td>{{ user.email }}</td>
                            <td><span class="badge rounded-pill bg-{{ 'danger' if user.role=='admin' else 'secondary' }}">{{ user.role }}</span></td>
                            <td>
                                <a href="{{ url_for('admin_delete_user', user_id=user.id) }}" class="btn btn-outline-danger btn-sm rounded-pill" onclick="return confirm('Delete {{ user.name }}?')"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                        {% endfor %}
                        </tbody>
                    </table>
                </div>
                {% else %}
                <p class="text-muted">No users found.</p>
                {% endif %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
